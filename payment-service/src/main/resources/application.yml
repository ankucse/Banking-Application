server:
  port: 8085

spring:
  application:
    name: payment-service

  # MySQL Configuration (For Epics 2, 3, 4)
  datasource:
    url: jdbc:mysql://localhost:3307/payment_db?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: "@246810Alpha"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # MongoDB Configuration (For Epic 1)
  data:
    mongodb:
      uri: mongodb://mongoadmin:mongopassword@localhost:27018/payment_db?authSource=admin

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
