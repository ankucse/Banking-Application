server:
  port: 8080
spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: onboarding-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/onboarding/**
        - id: customer-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/cif/**
        - id: ledger-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/ledger/**
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/beneficiaries/**,/api/v1/payments/**,/api/v1/wallets/**,/api/v1/upi/**
