version: '3.8'

services:
  # MySQL for Auth Service
  mysql:
    image: mysql:8.0
    container_name: banking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "@246810Alpha"
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - banking-network
    restart: unless-stopped

  # MongoDB for Onboarding Service
  mongodb:
    image: mongo:6.0
    container_name: banking-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: mongopassword
      MONGO_INITDB_DATABASE: onboarding_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - banking-network
    restart: unless-stopped

  # Redis for API Gateway Rate Limiting & Auth Sessions
  redis:
    image: redis:7.0-alpine
    container_name: banking-redis
    ports:
      - "6379:6379"
    networks:
      - banking-network
    restart: unless-stopped

  # Apache Kafka (Confluent Local - Single Node KRaft)
  kafka:
    image: confluentinc/confluent-local:7.5.0
    container_name: banking-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,BROKER://kafka:29092
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - banking-network
    restart: unless-stopped

volumes:
  mysql-data:
  mongodb-data:
  kafka-data:

networks:
  banking-network:
    driver: bridge
